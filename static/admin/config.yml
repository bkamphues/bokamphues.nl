backend:
  name: git-gateway
  branch: dev

local_backend: true

media_folder: static/assets
public_folder: /assets

collections:
  - name: projects
    label: Projects
    label_singular: Project
    description: >
      All creative, visual-effects and coding projects shown on the portfolio page.
    folder: content/projects
    create: true
    fields:
      - label: Project Title
        name: title
        widget: string
        hint: The project title.
      - label: Project Year
        name: year
        widget: number
        default: 2021
        value_type: int
        min: 2017
        hint: The year this project was made/finished.
      - label: Project Thumbnail
        name: thumbnail
        widget: image
        hint: A thumbnail used for the card on the overview portfolio page.
        media_library:
          allow_multiple: false
      - label: Description
        name: body
        widget: markdown
        hint: A short description about the project.
      - label: Github Link
        name: gh_link
        widget: string
        hint: A link to the github page if there is one.
      - label: Project Link
        name: pr_link
        widget: string
        hint: A link to a video or project page if there is one.

  - name: site_settings
    label: Site Settings
    label_singular: Site Setting
    description: >
      All site wide settings like navbar links, logo's etc.
    files:
      - label: "Navigation Bar"
        name: "navbar"
        file: "content/site_settings/navbar.yml"
        fields:
          - label: Navigation Links
            label_singular: Navigation Link
            name: nav_links
            widget: list
            fields:
              - label: Link Name
                name: link_name
                widget: string
              - label: Link URL
                name: link_url
                widget: string

  - name: articles
    label: Articles
    label_singular: Project
    description: >
      All articles for the blog page.
    folder: content/articles
    create: true
    fields:
      - label: Title
        name: title
        widget: string
      - label: Date
        name: date
        widget: datetime
      - label: Slug
        name: slug
        widget: string
      - label: Thumbnail
        name: thumbnail
        widget: image
        allow_multiple: false
      - label: Article
        name: body
        widget: markdown
      - label: Tags
        name: tags
        widget: list
        allow_add: true
        field: { label: Tag, name: tag, widget: string }
